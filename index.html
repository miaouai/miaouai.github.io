<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.title">喵有爱 | MiaouAI 🐱</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@400;600;700;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --neon-green: #00ff99;
            --dark-bg: #0a0e27;
            --card-bg: rgba(20, 30, 60, 0.8);
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #ff00cc 100%);
        }
        
        body {
            font-family: 'Nunito', system-ui, -apple-system, sans-serif;
            background: var(--dark-bg);
            color: white;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        .cyber-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(90deg, rgba(0,243,255,0.03) 1px, transparent 1px),
                linear-gradient(rgba(0,243,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: grid-move 20s linear infinite;
        }
        
        @keyframes grid-move {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }
        
        .particle {
            position: fixed;
            width: 4px; height: 4px;
            background: var(--neon-blue);
            border-radius: 50%;
            animation: float-particle 15s infinite ease-in-out;
            z-index: -1;
        }
        
        @keyframes float-particle {
            0%, 100% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100vh) scale(1); }
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        .hero {
            text-align: center;
            padding: 4rem 0;
            position: relative;
        }
        
        .avatar {
            width: 180px;
            height: 180px;
            margin: 0 auto 2rem;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
            animation: pulse 3s infinite ease-in-out;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .name {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }
        
        .tagline {
            font-size: 1.3rem;
            color: var(--neon-green);
            margin-bottom: 2rem;
            font-weight: 600;
        }
        
        .projects-section {
            margin: 4rem 0;
        }
        
        .section-title {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 2.5rem;
            margin-top: 2rem;
        }
        
        .project-card {
            background: var(--card-bg);
            border: 2px solid var(--neon-green);
            border-radius: 25px;
            padding: 2rem;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(15px);
            overflow: hidden;
        }
        
        .project-card::before {
            content: '🚀';
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 2rem;
            animation: rocket-fly 2s infinite ease-in-out;
        }
        
        @keyframes rocket-fly {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(-10deg); }
        }
        
        .project-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 25px 80px rgba(0, 255, 153, 0.4);
            border-color: var(--neon-blue);
        }
        
        .project-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .project-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--neon-blue);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        .project-slogan {
            color: var(--neon-pink);
            font-style: italic;
            font-size: 1rem;
            margin-bottom: 1rem;
            font-weight: 600;
            border-left: 3px solid var(--neon-pink);
            padding-left: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 5px var(--neon-pink); }
            to { text-shadow: 0 0 20px var(--neon-pink), 0 0 30px var(--neon-pink); }
        }
        
        .project-description {
            color: #bbb;
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }
        
        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        
        .tag {
            background: rgba(0, 243, 255, 0.2);
            color: var(--neon-blue);
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid var(--neon-blue);
        }
        
        .project-links {
            display: flex;
            gap: 1rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: 'Orbitron', sans-serif;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
            color: white;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 40px rgba(0, 243, 255, 0.5);
        }
        
        .btn-secondary {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
        }
        
        .btn-secondary:hover {
            background: var(--neon-green);
            color: var(--dark-bg);
            transform: scale(1.05);
        }
        
        .btn-disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-disabled:hover {
            transform: none;
            box-shadow: none;
        }
        
        .about-section {
            margin: 4rem 0;
        }
        
        .about-card {
            background: var(--card-bg);
            border: 2px solid var(--neon-pink);
            border-radius: 25px;
            padding: 2rem;
            backdrop-filter: blur(15px);
            margin-top: 2rem;
        }
        
        .about-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ddd;
            text-align: center;
        }
        
        footer {
            text-align: center;
            padding: 3rem 0;
            margin-top: 4rem;
            border-top: 1px solid rgba(0, 243, 255, 0.3);
            color: #888;
        }
        
        .footer-link {
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 700;
        }
        
        .footer-link:hover {
            text-decoration: underline;
            color: var(--neon-pink);
        }
        
        @media (max-width: 768px) {
            .name { font-size: 2.5rem; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="cyber-grid"></div>
    <div id="particles"></div>
    
    <div class="container">
        <!-- Hero Section -->
        <section class="hero">
            <div class="avatar" id="hero-avatar"></div>
            <h1 class="name" id="hero-name"></h1>
            <p class="tagline" id="hero-tagline"></p>
        </section>
        
        <!-- Projects Section -->
        <section class="projects-section">
            <h2 class="section-title">🚀 项目展示</h2>
            <div class="projects-grid" id="projects-container">
                <!-- Projects will be loaded dynamically -->
            </div>
        </section>
        
        <!-- About Section -->
        <section class="about-section">
            <h2 class="section-title">🐾 关于我</h2>
            <div class="about-card">
                <p class="about-text" id="about-content"></p>
            </div>
        </section>
    </div>
    
    <footer id="footer-container">
        <!-- Footer links will be loaded dynamically -->
    </footer>
    
    <script>
        // Load configuration from JSON file
        async function loadConfiguration() {
            try {
                const response = await fetch('./data.json');
                if (!response.ok) throw new Error('Failed to load config');
                
                const config = await response.json();
                renderPage(config);
            } catch (error) {
                console.error('Error loading configuration:', error);
                document.getElementById('projects-container').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                        <h3 style="color: #ff4d4f;">⚠️ 加载配置失败</h3>
                        <p style="color: #bbb; margin-top: 1rem;">请稍后重试或联系管理员</p>
                    </div>
                `;
            }
        }
        
        function renderPage(config) {
            // Render hero section
            if (config.about) {
                document.getElementById('hero-avatar').textContent = config.about.emoji || '🐱';
                document.getElementById('hero-name').textContent = config.about.name;
                document.getElementById('hero-tagline').textContent = config.about.tagline;
                
                // Render about section
                const aboutHtml = config.about.description.map(line => `<p style="margin-bottom: 1rem;">${line}</p>`).join('');
                document.getElementById('about-content').innerHTML = aboutHtml;
            }
            
            // Render projects
            if (config.projects && Array.isArray(config.projects)) {
                const projectsHtml = config.projects.map(project => createProjectCard(project)).join('');
                document.getElementById('projects-container').innerHTML = projectsHtml;
            }
            
            // Render footer
            renderFooter(config.footer);
            
            // Update page title
            document.querySelector('[data-i18n="page.title"]').textContent = config.about ? `${config.about.name.split('·')[0]} | ${config.about.name.split('·')[1]?.trim() || ''}` : '喵有爱 | MiaouAI 🐱';
        }
        
        function createProjectCard(project) {
            const githubBtn = `
                <a href="${project.github}" class="btn btn-primary" target="_blank">
                    <i class="ri-github-line"></i> GitHub
                </a>`;
            
            let demoBtn = '';
            if (project.demo && project.demo.trim() !== '') {
                demoBtn = `
                <a href="${project.demo}" class="btn btn-secondary" target="_blank">
                    <i class="ri-earth-line"></i> 在线演示
                </a>`;
            } else {
                demoBtn = `
                <button class="btn btn-disabled" disabled>
                    <i class="ri-earth-line"></i> 暂无演示
                </button>`;
            }
            
            const tagsHtml = (project.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('');
            
            return `
                <div class="project-card">
                    <div class="project-icon">${project.icon || '🚀'}</div>
                    <h3 class="project-title">${project.title}</h3>
                    ${project.slogan ? `<p class="project-slogan">"${project.slogan}"</p>` : ''}
                    <p class="project-description">${project.description}</p>
                    <div class="project-tags">${tagsHtml}</div>
                    <div class="project-links">
                        ${githubBtn}
                        ${demoBtn}
                    </div>
                </div>
            `;
        }
        
        function renderFooter(footerConfig) {
            if (!footerConfig) return;
            
            const linksHtml = (footerConfig.links || [])
                .filter(link => link.url)
                .map(link => `<a href="${link.url}" class="footer-link" target="_blank">${link.name}</a>`)
                .join(' • ');
            
            const copyright = footerConfig.copyright || '© 2025 MiaouAI | 猫咪出品 🐱';
            
            document.getElementById('footer-container').innerHTML = `
                <p>Made with 🐱 by <strong>MiaouAI</strong></p>
                <p style="margin-top: 0.5rem;">${linksHtml}</p>
                <p style="margin-top: 1rem; font-size: 0.9rem;">${copyright}</p>
            `;
        }
        
        // Generate floating particles
        function initParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particle.style.background = Math.random() > 0.5 ? '#00f3ff' : '#ff00ff';
                particlesContainer.appendChild(particle);
            }
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initParticles();
            loadConfiguration();
            
            console.log('🐱 MiaouAI Homepage loaded!');
            console.log('📦 Data-driven architecture initialized');
        });
    </script>
</body>
</html>
